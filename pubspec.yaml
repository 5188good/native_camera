name: native_camera
description: "High-performance Windows camera plugin for Flutter using Media Foundation. Direct NV12/YUY2 capture with zero-copy frame delivery — no IMFCaptureEngine overhead."
version: 0.1.0
homepage: https://github.com/yourusername/native_camera
repository: https://github.com/yourusername/native_camera
issue_tracker: https://github.com/yourusername/native_camera/issues

environment:
  sdk: ^3.7.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: NativeCameraPluginCApi
